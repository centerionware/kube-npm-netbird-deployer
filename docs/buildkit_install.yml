---
apiVersion: v1
kind: Namespace
metadata:
  name: buildkit

---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: andrcuns
  namespace: flux-system
spec:
  interval: 10m
  url: https://andrcuns.github.io/charts

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: buildkit
  namespace: buildkit
spec:
  interval: 5m
  chart:
    spec:
      chart: buildkit-service
      sourceRef:
        kind: HelmRepository
        name: andrcuns
        namespace: flux-system