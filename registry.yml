############################################
# NAMESPACES
############################################
apiVersion: v1
kind: Namespace
metadata:
  name: registry
---
apiVersion: v1
kind: Namespace
metadata:
  name: platform

############################################
# STORAGE (10Gi, local-path)
############################################
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: registry-pvc
  namespace: registry
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi

############################################
# DOCKER REGISTRY
# :contentReference[oaicite:0]{index=0}
############################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
    spec:
      containers:
        - name: registry
          image: registry:2
          ports:
            - containerPort: 5000
          env:
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          volumeMounts:
            - name: data
              mountPath: /var/lib/registry
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: registry-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: registry
  namespace: registry
spec:
  selector:
    app: registry
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP

############################################
# REGISTRY CLEANUP CRONJOB
############################################
apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-cleanup
  namespace: registry
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: cleanup
              image: alpine:3.20
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache curl jq

                  REGISTRY=http://registry.registry.svc.cluster.local:5000

                  echo "Fetching repositories..."
                  repos=$(curl -s $REGISTRY/v2/_catalog | jq -r '.repositories[]')

                  for repo in $repos; do
                    echo "Processing $repo"

                    tags=$(curl -s $REGISTRY/v2/$repo/tags/list | jq -r '.tags[]' | sort -r)

                    delete=$(echo "$tags" | tail -n +4)

                    for tag in $delete; do
                      echo "Deleting $repo:$tag"

                      digest=$(curl -sI \
                        -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
                        $REGISTRY/v2/$repo/manifests/$tag \
                        | awk '/Docker-Content-Digest/ {print $2}' | tr -d '\r')

                      if [ ! -z "$digest" ]; then
                        curl -X DELETE $REGISTRY/v2/$repo/manifests/$digest
                      fi
                    done
                  done