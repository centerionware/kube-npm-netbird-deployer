apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-deploy-operator

rules:
  # App CRD
  - apiGroups: ["kube-deploy.centerionware.app"]
    resources: ["apps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  - apiGroups: ["kube-deploy.centerionware.app"]
    resources: ["apps/status"]
    verbs: ["get", "update", "patch"]

  # ContainerApp CRD
  - apiGroups: ["kube-deploy.centerionware.app"]
    resources: ["containerapps"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  - apiGroups: ["kube-deploy.centerionware.app"]
    resources: ["containerapps/status"]
    verbs: ["get", "update", "patch"]

  # Kubernetes core resources
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["*"]

  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims", "secrets"]
    verbs: ["*"]

  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["*"]

  # Ingress
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["*"]

  # Gateway API
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["*"]

  # Autoscaling
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["*"]

  # RBAC â€” for creating ServiceAccounts, Roles, RoleBindings per app
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["*"]

  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterrolebindings"]
    verbs: ["*"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-deploy-operator

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kube-deploy-operator

subjects:
  - kind: ServiceAccount
    name: {{ .Values.serviceAccount.name }}
    namespace: {{ .Values.namespace }}