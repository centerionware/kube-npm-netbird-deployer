apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: npmapps.npm.centerionware.app
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"

spec:
  group: npm.centerionware.app
  scope: Namespaced

  names:
    plural: npmapps
    singular: npmapp
    kind: NpmApp
    shortNames: ["npm"]

  versions:
    - name: v1alpha1
      served: true
      storage: true

      subresources:
        status: {}

      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["repo"]
              properties:
                repo:
                  type: string

                env:
                  type: object
                  additionalProperties:
                    type: string

                build:
                  type: object
                  default: {}
                  properties:
                    baseImage:
                      type: string
                      default: "node:20-alpine"
                    installCmd:
                      type: string
                      default: "npm install --legacy-peer-deps"
                    buildCmd:
                      type: string
                      default: "npm run build"
                    output:
                      type: string
                      default: ""
                    args:
                      type: array
                      items:
                        type: string
                      default: []
                    registry:
                      type: string
                      default: "registry.registry.svc.cluster.local:5000"

                run:
                  type: object
                  default: {}
                  properties:
                    command:
                      type: array
                      items:
                        type: string
                      default: ["npm", "start"]
                    args:
                      type: array
                      items:
                        type: string
                      default: []
                    port:
                      type: integer
                      default: 3000
                    registry:
                      type: string
                      default: "localhost:31999"

                service:
                  type: object
                  default: {}
                  properties:
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                      default: {}

            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true
              properties:
                phase:
                  type: string
                image:
                  type: string
                commit:
                  type: string
                lastUpdate:
                  type: string