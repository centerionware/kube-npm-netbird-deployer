# ============================================================
# App CRD â€” build from source and deploy
# ============================================================
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apps.kube-deploy.centerionware.app
  annotations:
    "helm.sh/hook": "pre-install,pre-upgrade"
    "helm.sh/hook-delete-policy": "before-hook-creation"
spec:
  group: kube-deploy.centerionware.app
  scope: Namespaced
  names:
    plural: apps
    singular: app
    kind: App
    shortNames: ["app"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Commit
          type: string
          jsonPath: .status.commit
        - name: Image
          type: string
          jsonPath: .status.image
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["repo"]
              properties:
                repo:
                  type: string
                updateInterval:
                  type: string
                  default: "1m"
                env:
                  type: object
                  additionalProperties:
                    type: string
                build:
                  type: object
                  default: {}
                  properties:
                    baseImage:
                      type: string
                      default: "node:20-alpine"
                    installCmd:
                      type: string
                      default: "npm install --legacy-peer-deps"
                    buildCmd:
                      type: string
                      default: "npm run build"
                    output:
                      type: string
                      default: ""
                    args:
                      type: array
                      items:
                        type: string
                      default: []
                    registry:
                      type: string
                      default: "registry.registry.svc.cluster.local:5000"
                    gitSecret:
                      type: string
                    registrySecret:
                      type: string
                    dockerfileMode:
                      type: string
                      default: "auto"
                      enum: ["auto", "generate", "inline"]
                      description: "auto=use repo Dockerfile if present else generate, generate=always generate, inline=use dockerfile field"
                    dockerfile:
                      type: string
                      default: ""
                      description: "Complete Dockerfile content. Only used when dockerfileMode is inline."
                run:
                  type: object
                  default: {}
                  properties:
                    command:
                      type: array
                      items:
                        type: string
                      default: ["npm", "start"]
                    args:
                      type: array
                      items:
                        type: string
                      default: []
                    port:
                      type: integer
                      default: 3000
                    replicas:
                      type: integer
                      default: 1
                    registry:
                      type: string
                      default: "localhost:31999"
                    imagePullSecret:
                      type: string
                    hostNetwork:
                      type: boolean
                      default: false
                    resources:
                      type: object
                      properties:
                        cpuRequest:
                          type: string
                        memoryRequest:
                          type: string
                        cpuLimit:
                          type: string
                        memoryLimit:
                          type: string
                    healthCheck:
                      type: object
                      properties:
                        path:
                          type: string
                    volumes:
                      type: array
                      items:
                        type: object
                        required: ["name", "mountPath"]
                        properties:
                          name:
                            type: string
                          mountPath:
                            type: string
                          pvc:
                            type: object
                            properties:
                              claimName:
                                type: string
                              size:
                                type: string
                                default: "1Gi"
                              storageClass:
                                type: string
                                default: "local-path"
                              readOnly:
                                type: boolean
                          configMap:
                            type: object
                            required: ["name"]
                            properties:
                              name:
                                type: string
                              items:
                                type: array
                                items:
                                  type: object
                                  required: ["key", "path"]
                                  properties:
                                    key:
                                      type: string
                                    path:
                                      type: string
                          secret:
                            type: object
                            required: ["secretName"]
                            properties:
                              secretName:
                                type: string
                              items:
                                type: array
                                items:
                                  type: object
                                  required: ["key", "path"]
                                  properties:
                                    key:
                                      type: string
                                    path:
                                      type: string
                          emptyDir:
                            type: object
                            properties:
                              medium:
                                type: string
                                enum: ["", "Memory"]
                          hostPath:
                            type: object
                            required: ["path"]
                            properties:
                              path:
                                type: string
                              type:
                                type: string
                    autoscaling:
                      type: object
                      properties:
                        enabled:
                          type: boolean
                          default: false
                        minReplicas:
                          type: integer
                          default: 1
                        maxReplicas:
                          type: integer
                          default: 5
                        cpuTarget:
                          type: integer
                          default: 80
                service:
                  type: object
                  default: {}
                  properties:
                    type:
                      type: string
                      default: "ClusterIP"
                      enum: ["ClusterIP", "NodePort", "LoadBalancer", "ExternalName"]
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                      default: {}
                    labels:
                      type: object
                      additionalProperties:
                        type: string
                    clusterIP:
                      type: string
                    externalIPs:
                      type: array
                      items:
                        type: string
                    loadBalancerIP:
                      type: string
                    loadBalancerSourceRanges:
                      type: array
                      items:
                        type: string
                    externalTrafficPolicy:
                      type: string
                      enum: ["Cluster", "Local"]
                    sessionAffinity:
                      type: string
                      enum: ["None", "ClientIP"]
                    publishNotReadyAddresses:
                      type: boolean
                    ports:
                      type: array
                      items:
                        type: object
                        required: ["port"]
                        properties:
                          name:
                            type: string
                            default: ""
                          port:
                            type: integer
                          targetPort:
                            type: integer
                          nodePort:
                            type: integer
                          protocol:
                            type: string
                            enum: ["TCP", "UDP"]
                            default: "TCP"
                    portRanges:
                      type: array
                      description: "Expand a range of ports into individual service ports"
                      items:
                        type: object
                        required: ["start", "end"]
                        properties:
                          start:
                            type: integer
                            description: "Start of port range (inclusive)"
                          end:
                            type: integer
                            description: "End of port range (inclusive)"
                          protocol:
                            type: string
                            enum: ["TCP", "UDP"]
                            default: "UDP"
                            description: "Protocol for all ports in range. Default: UDP"
                          targetPortOffset:
                            type: integer
                            default: 0
                            description: "Offset added to port number to get targetPort. Default: 0"
                ingress:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    host:
                      type: string
                    className:
                      type: string
                    tlsSecret:
                      type: string
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                    paths:
                      type: array
                      items:
                        type: object
                        required: ["path"]
                        properties:
                          path:
                            type: string
                          pathType:
                            type: string
                            enum: ["Prefix", "Exact", "ImplementationSpecific"]
                            default: "Prefix"
                gateway:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                      default: false
                    gatewayRef:
                      type: object
                      required: ["name"]
                      properties:
                        name:
                          type: string
                        namespace:
                          type: string
                        sectionName:
                          type: string
                    hostnames:
                      type: array
                      items:
                        type: string
                    tlsSecret:
                      type: string
                    paths:
                      type: array
                      items:
                        type: object
                        required: ["path"]
                        properties:
                          path:
                            type: string
                          matchType:
                            type: string
                            enum: ["PathPrefix", "Exact", "RegularExpression"]
                            default: "PathPrefix"
                    annotations:
                      type: object
                      additionalProperties:
                        type: string
                rbac:
                  type: object
                  description: "Full RBAC chain â€” creates ServiceAccount, Roles, ClusterRoles and bindings"
                  properties:
                    serviceAccountName:
                      type: string
                      description: "Override ServiceAccount name (defaults to app name)"
                    roles:
                      type: array
                      description: "Namespace-scoped Roles to CREATE and bind to the ServiceAccount"
                      items:
                        type: object
                        required: ["name", "rules"]
                        properties:
                          name:
                            type: string
                          rules:
                            type: array
                            items:
                              type: object
                              required: ["apiGroups", "resources", "verbs"]
                              properties:
                                apiGroups:
                                  type: array
                                  items:
                                    type: string
                                resources:
                                  type: array
                                  items:
                                    type: string
                                verbs:
                                  type: array
                                  items:
                                    type: string
                                resourceNames:
                                  type: array
                                  items:
                                    type: string
                    clusterRoles:
                      type: array
                      description: "ClusterRoles to CREATE and bind to the ServiceAccount"
                      items:
                        type: object
                        required: ["name", "rules"]
                        properties:
                          name:
                            type: string
                          rules:
                            type: array
                            items:
                              type: object
                              required: ["apiGroups", "resources", "verbs"]
                              properties:
                                apiGroups:
                                  type: array
                                  items:
                                    type: string
                                resources:
                                  type: array
                                  items:
                                    type: string
                                verbs:
                                  type: array
                                  items:
                                    type: string
                                resourceNames:
                                  type: array
                                  items:
                                    type: string
                    roleBindings:
                      type: array
                      description: "Names of EXISTING namespace Roles to bind to the ServiceAccount"
                      items:
                        type: string
                    clusterRoleBindings:
                      type: array
                      description: "Names of EXISTING ClusterRoles to bind to the ServiceAccount e.g. [cluster-admin]"
                      items:
                        type: string
            status:
              type: object
              x-kubernetes-preserve-unknown-fields: true

