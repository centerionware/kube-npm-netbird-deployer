apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: npmapps.npm.centerionware.app

spec:
  group: npm.centerionware.app
  scope: Namespaced

  names:
    plural: npmapps
    singular: npmapp
    kind: NpmApp
    shortNames: ["npm"]

  versions:
    - name: v1alpha1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          properties:
            spec:
              type: object
              required: ["repo"]

              properties:
                repo:
                  type: string

                env:
                  type: object
                  additionalProperties:
                    type: string

                build:
                  type: object
                  properties:
                    installCommand:
                      type: string
                    buildCommand:
                      type: string
                    output:
                      type: string   # 🔥 IMPORTANT (used by resolveImage)

                run:
                  type: object
                  properties:
                    command:
                      type: array      # ✅ FIXED
                      items:
                        type: string
                    args:
                      type: array      # ✅ ADDED
                      items:
                        type: string
                    port:
                      type: integer

                service:
                  type: object
                  properties:
                    annotations:
                      type: object
                      additionalProperties:
                        type: string

            status:
              type: object
              properties:
                phase:
                  type: string
                image:
                  type: string
                commit:
                  type: string
                lastUpdate:
                  type: string