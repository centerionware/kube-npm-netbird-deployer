apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: npmapps.npm.centerionware.app
spec:
  group: npm.centerionware.app
  scope: Namespaced

  names:
    kind: NpmApp
    plural: npmapps
    singular: npmapp
    shortNames:
      - npmapp

  versions:
    - name: v1alpha1
      served: true
      storage: true

      schema:
        openAPIV3Schema:
          type: object

          required:
            - spec

          properties:
            spec:
              type: object

              required:
                - repo

              properties:

                ############################################
                # SOURCE
                ############################################
                repo:
                  type: string
                  description: Git repository URL

                revision:
                  type: string
                  default: main

                ############################################
                # IMAGE / BUILD OUTPUT
                ############################################
                image:
                  type: string
                  description: >
                    Target container image (local registry or external)

                imageTagStrategy:
                  type: string
                  enum: ["latest", "gitsha", "semantic", "manual"]
                  default: "gitsha"

                ############################################
                # BUILD CONFIG (npm-first defaults)
                ############################################
                build:
                  type: object
                  properties:

                    builder:
                      type: string
                      default: "paketobuildpacks/builder:base"
                      description: >
                        Buildpack or builder image (used by kpack)

                    buildTool:
                      type: string
                      enum: ["npm", "yarn", "pnpm", "bun", "custom"]
                      default: "npm"

                    installCommand:
                      type: string
                      default: "npm install"

                    buildCommand:
                      type: string
                      default: "npm run build"

                    outputDir:
                      type: string
                      default: "."

                    cacheEnabled:
                      type: boolean
                      default: true

                    env:
                      type: object
                      additionalProperties:
                        type: string

                    preBuild:
                      type: array
                      items:
                        type: string
                      description: "Commands executed before install"

                    postBuild:
                      type: array
                      items:
                        type: string
                      description: "Commands executed after build"

                ############################################
                # RUNTIME CONFIG
                ############################################
                run:
                  type: object
                  properties:

                    command:
                      type: string
                      default: "npm start"

                    args:
                      type: array
                      items:
                        type: string

                    port:
                      type: integer
                      default: 3000

                    env:
                      type: object
                      additionalProperties:
                        type: string

                    healthPath:
                      type: string
                      default: "/"

                    healthPort:
                      type: integer

                ############################################
                # SCALING (future-friendly)
                ############################################
                scaling:
                  type: object
                  properties:
                    minReplicas:
                      type: integer
                      default: 1

                    maxReplicas:
                      type: integer
                      default: 1

                ############################################
                # RESOURCES (optional)
                ############################################
                resources:
                  type: object
                  properties:
                    cpu:
                      type: string
                      default: "100m"
                    memory:
                      type: string
                      default: "128Mi"

                ############################################
                # ADVANCED OVERRIDES
                ############################################
                advanced:
                  type: object
                  properties:

                    imagePullPolicy:
                      type: string
                      enum: ["Always", "IfNotPresent", "Never"]
                      default: "IfNotPresent"

                    serviceType:
                      type: string
                      enum: ["ClusterIP"]
                      default: "ClusterIP"

                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string

                    tolerations:
                      type: array
                      items:
                        type: object

                    affinity:
                      type: object

                ############################################
                # SECRETS / ENV INJECTION
                ############################################
                envFrom:
                  type: array
                  items:
                    type: object
                    properties:
                      secretRef:
                        type: string
                      configMapRef:
                        type: string