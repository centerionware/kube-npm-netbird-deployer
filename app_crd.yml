############################################
# CRD: APP ABSTRACTION
############################################
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: apps.platform.local
spec:
  group: platform.local
  scope: Namespaced
  names:
    kind: App
    plural: apps
    singular: app
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["repo", "image"]
              properties:
                repo:
                  type: string
                revision:
                  type: string
                  default: main
                image:
                  type: string
                port:
                  type: integer
                  default: 3000
                env:
                  type: object
                  additionalProperties:
                    type: string
